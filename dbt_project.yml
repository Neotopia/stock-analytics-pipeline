name: 'analytics_mvp'
version: '1.0.0'
profile: 'analytics_mvp'

model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  analytics_mvp:
    staging:
      +materialized: view    # lightweight views, always fresh on each dbt run
      +schema: staging       # written to public_staging schema in PostgreSQL
    marts:
      +materialized: table   # persisted tables, optimized for Metabase queries
