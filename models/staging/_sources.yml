version: 2

sources:
  - name: public
    schema: public
    description: "Raw data loaded by load_data.py from Yahoo Finance via yfinance."
    tables:
      - name: stock_prices_raw
        description: "Raw OHLCV stock prices — one row per trading day per ticker."
        columns:
          - name: Date
            description: "Trading date (written with uppercase by yfinance)."
          - name: Ticker
            description: "Stock or index symbol (AAPL, MSFT, ^GSPC, ^FCHI…)."
          - name: Open
            description: "Opening price of the trading session."
          - name: High
            description: "Highest price reached during the trading session."
          - name: Low
            description: "Lowest price reached during the trading session."
          - name: Close
            description: "Closing price of the trading session."
          - name: Volume
            description: "Number of shares traded during the session."
