version: 2

models:
  - name: stg_stock_prices
    description: "Prix d'actions nettoyés et typés (couche Silver)"
    columns:
      - name: date
        description: "Date de la cotation"
        tests:
          - not_null
      - name: ticker
        description: "Code boursier"
        tests:
          - not_null
          - accepted_values:
              values: ['AAPL', 'MSFT', 'GOOGL']
      - name: close
        description: "Prix de clôture"
        tests:
          - not_null
      - name: volume
        description: "Volume de transactions"
