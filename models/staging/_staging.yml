version: 2

models:
  - name: stg_stock_prices
    description: "Silver layer — cleaned, typed, and filtered stock prices. One row per trading day per ticker."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - date
            - ticker
    columns:
      - name: date
        description: "Trading date (cast to date type)."
        tests:
          - not_null
      - name: ticker
        description: "Stock or index symbol (e.g. AAPL, ^GSPC). Set is dynamic — see seeds/tickers.csv."
        tests:
          - not_null
      - name: open
        description: "Opening price."
        tests:
          - not_null
      - name: high
        description: "Daily high price."
        tests:
          - not_null
      - name: low
        description: "Daily low price."
        tests:
          - not_null
      - name: close
        description: "Closing price."
        tests:
          - not_null
      - name: volume
        description: "Number of shares traded."
        tests:
          - not_null
